name: Update Latest Videos from YouTube & Rumble

on:
  schedule:
    - cron: '0 13 * * *'     # Runs **once per day** at 1:00 PM UTC
  workflow_dispatch:         # Allows you to run it manually anytime

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README with latest videos
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: |
            https://www.youtube.com/feeds/videos.xml?channel_id=UCFyM3oePGVXyU4fqZDuD1xQ
            https://rss.app/feeds/d0gxUSEhmi1H5RJu.xml
          max_post_count: 8
          readme_path: ./README.md
          date_format: "MMMM d, yyyy"
          template: |
            <table><tr><td><a href="$url"><img width="280" src="https://img.youtube.com/vi/$videoId/maxresdefault.jpg" alt="$title"></a></td><td><strong><a href="$url">$title</a></strong><br><small>$date</small></td></tr></table>
